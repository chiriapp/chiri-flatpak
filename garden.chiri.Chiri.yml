id: garden.chiri.Chiri
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: garden.chiri.Chiri

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

  # Network (CalDAV sync)
  - --share=network

  # Notifications
  - --talk-name=org.freedesktop.Notifications

  # System tray icon - talk to the SNI watcher and own the StatusNotifierItem well-known name.
  # libappindicator claims org.kde.StatusNotifierItem-{PID}-1; the wildcard must follow a period in Flatpak policy,
  # so org.kde.* is the valid form (org.kde.StatusNotifierItem-{PID}-1 is one element after org.kde.).
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --own-name=org.kde.*

  # libappindicator writes the tray icon to $TMPDIR as a temp file. Flatpak's
  # default /tmp is a private sandboxed directory (mapped to
  # /run/user/1000/.flatpak/<id>/tmp/ on the host), so the host tray manager
  # (KDE plasma) cannot find the icon when it reads the IconThemePath from
  # D-Bus. --filesystem=/tmp mounts the real host /tmp into the sandbox,
  # making the icon file visible to both the app and the host tray.
  - --filesystem=/tmp
  - --env=TMPDIR=/tmp

modules:
  # Tray icon support (includes libdbusmenu, libindicator, libappindicator)
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: Chiri
    buildsystem: simple

    sources:
      # Metainfo file
      - type: file
        path: garden.chiri.Chiri.metainfo.xml

      # Desktop file
      - type: file
        path: garden.chiri.Chiri.desktop

      # x86_64 .deb package
      - type: file
        url: https://github.com/chiriapp/chiri/releases/download/app-v0.8.1/Chiri_0.8.1_amd64.deb
        sha256: 0ef1418f921ebd558b6eac8cdfa1c996f83b104c88a3f83973d3b5c7798c828f
        only-arches: [x86_64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/chiriapp/chiri/releases/latest
          version-query: .tag_name | sub("^app-v"; "")
          url-query: '"https://github.com/chiriapp/chiri/releases/download/app-v" + $version + "/Chiri_" + $version + "_amd64.deb"'

      # ARM64 .deb package
      - type: file
        url: https://github.com/chiriapp/chiri/releases/download/app-v0.8.1/Chiri_0.8.1_arm64.deb
        sha256: 38c34a5faf7043b0ff315fe7b4e8e3f4e9a7e88abc581aae5a0368ebb6f0ae75
        only-arches: [aarch64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/chiriapp/chiri/releases/latest
          version-query: .tag_name | sub("^app-v"; "")
          url-query: '"https://github.com/chiriapp/chiri/releases/download/app-v" + $version + "/Chiri_" + $version + "_arm64.deb"'


    build-commands:
      # Safety: exit on any error
      - set -e

      # Extract the .deb package
      - mkdir deb-extract
      - ar -x *.deb --output deb-extract
      - tar -C deb-extract -xf deb-extract/data.tar.gz

      # Install the binary named after the Flatpak app ID. Tauri appears to derive the GtkApplication ID
      # (and thus the Wayland xdg_toplevel app_id) from the binary name rather than the tauri.conf.json
      # identifier. Naming it garden.chiri.Chiri makes KWin find the correct garden.chiri.Chiri.desktop entry for the title bar icon.
      - install -Dm755 deb-extract/usr/bin/Chiri /app/bin/garden.chiri.Chiri

      # If there are bundled resources (uncomment if needed)
      # - mkdir -p /app/lib/chiri
      # - cp -r deb-extract/usr/lib/chiri/. /app/lib/chiri
      # - find /app/lib/chiri -type f -exec chmod 644 {} \;

      # Install icons with Flatpak naming (app-id based)
      - install -Dm644 deb-extract/usr/share/icons/hicolor/32x32/apps/Chiri.png
        /app/share/icons/hicolor/32x32/apps/garden.chiri.Chiri.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/128x128/apps/Chiri.png
        /app/share/icons/hicolor/128x128/apps/garden.chiri.Chiri.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/256x256@2/apps/Chiri.png
        /app/share/icons/hicolor/256x256@2/apps/garden.chiri.Chiri.png

      # Install desktop file with icon reference updated
      - install -Dm644 garden.chiri.Chiri.desktop
        /app/share/applications/garden.chiri.Chiri.desktop

      # Install metainfo for app stores
      - install -Dm644 garden.chiri.Chiri.metainfo.xml
        /app/share/metainfo/garden.chiri.Chiri.metainfo.xml
